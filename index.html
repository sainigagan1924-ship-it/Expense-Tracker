<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Expense Tracker</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-light">
    <div class="container my-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <div
            class="d-flex flex-column flex-md-row justify-content-between align-items-start mb-3"
          >
            <h1 class="h4 mb-2 mb-md-0">Expense Tracker</h1>

            <div class="d-flex gap-2">
              <div class="border rounded p-2 text-center bg-white">
                <small class="text-muted d-block">Income</small>
                <div id="total-income" class="fw-bold fs-5">0.00</div>
              </div>
              <div class="border rounded p-2 text-center bg-white">
                <small class="text-muted d-block">Expenses</small>
                <div id="total-expense" class="fw-bold fs-5">0.00</div>
              </div>
              <div class="border rounded p-2 text-center bg-white">
                <small class="text-muted d-block">Balance</small>
                <div id="total-balance" class="fw-bold fs-5">0.00</div>
              </div>
            </div>
          </div>

          <div class="row g-4">
            <div class="col-lg-5">
              <div class="card border-0">
                <div class="card-body">
                  <form id="txn-form" class="needs-validation" novalidate>
                    <input type="hidden" id="txn-id" value="" />
                    <div class="mb-2">
                      <input
                        id="txn-title"
                        class="form-control"
                        placeholder="Title"
                        required
                      />
                    </div>

                    <div class="row g-2 mb-2">
                      <div class="col-6">
                        <select id="txn-type" class="form-select">
                          <option value="income">Income</option>
                          <option value="expense">Expense</option>
                        </select>
                      </div>
                      <div class="col-6">
                        <input
                          id="txn-amount"
                          type="number"
                          step="0.01"
                          class="form-control"
                          placeholder="Amount"
                          required
                        />
                      </div>
                    </div>

                    <div class="row g-2 mb-2">
                      <div class="col-6">
                        <input id="txn-date" type="date" class="form-control" />
                      </div>
                      <div class="col-6">
                        <input
                          id="txn-desc"
                          class="form-control"
                          placeholder="Description (optional)"
                        />
                      </div>
                    </div>

                    <div class="d-flex gap-2">
                      <button
                        type="submit"
                        id="save-btn"
                        class="btn btn-primary flex-fill"
                      >
                        Add
                      </button>
                      <button
                        type="button"
                        id="clear-btn"
                        class="btn btn-outline-secondary"
                      >
                        Clear
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>

            <div class="col-lg-7">
              <div
                class="d-flex justify-content-between align-items-center mb-2"
              >
                <h5 class="mb-0">Transactions</h5>
                <input
                  id="search"
                  class="form-control form-control-sm w-50"
                  placeholder="Search title or description"
                />
              </div>

              <div class="table-responsive">
                <table id="txn-table" class="table table-hover align-middle">
                  <thead class="table-light">
                    <tr>
                      <th>Title</th>
                      <th>Type</th>
                      <th>Amount</th>
                      <th>Date</th>
                      <th>Description</th>
                      <th class="text-end">Actions</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>

              <p id="empty-msg" class="text-muted small mt-2">
                No transactions yet.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./js/data.js"></script>
<script src="./js/storage.js"></script>
<script src="./js/transactions.js"></script>
<script src="./js/ui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
